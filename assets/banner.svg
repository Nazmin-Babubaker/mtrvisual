<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020d1f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63c8ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#63c8ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
  </g>

  <!-- Route line -->
  <line x1="120" y1="80" x2="680" y2="80" stroke="#63c8ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>

  <!-- Hop nodes -->
  <circle cx="120" cy="80" r="7" fill="#22c55e" opacity="0.85" filter="url(#glow)">
    <animate attributeName="r" values="7;9;7" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0.4;0.85" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="80" r="14" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="7;22" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="280" cy="80" r="6" fill="#3b82f6" opacity="0.8" filter="url(#glow)">
    <animate attributeName="r" values="6;8;6" dur="2.4s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="opacity" values="0.8;0.35;0.8" dur="2.4s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="280" cy="80" r="6" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0">
    <animate attributeName="r" values="6;20" dur="2.4s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="opacity" values="0.4;0" dur="2.4s" repeatCount="indefinite" begin="0.3s"/>
  </circle>

  <circle cx="400" cy="80" r="6" fill="#a855f7" opacity="0.8" filter="url(#glow)">
    <animate attributeName="r" values="6;8;6" dur="2.1s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="0.8;0.35;0.8" dur="2.1s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="400" cy="80" r="6" fill="none" stroke="#a855f7" stroke-width="1" opacity="0">
    <animate attributeName="r" values="6;20" dur="2.1s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="0.4;0" dur="2.1s" repeatCount="indefinite" begin="0.6s"/>
  </circle>

  <circle cx="520" cy="80" r="6" fill="#f97316" opacity="0.8" filter="url(#glow)">
    <animate attributeName="r" values="6;8;6" dur="1.9s" repeatCount="indefinite" begin="0.9s"/>
    <animate attributeName="opacity" values="0.8;0.35;0.8" dur="1.9s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  <circle cx="520" cy="80" r="6" fill="none" stroke="#f97316" stroke-width="1" opacity="0">
    <animate attributeName="r" values="6;20" dur="1.9s" repeatCount="indefinite" begin="0.9s"/>
    <animate attributeName="opacity" values="0.4;0" dur="1.9s" repeatCount="indefinite" begin="0.9s"/>
  </circle>

  <circle cx="680" cy="80" r="7" fill="#ef4444" opacity="0.9" filter="url(#glow)">
    <animate attributeName="r" values="7;9;7" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <circle cx="680" cy="80" r="7" fill="none" stroke="#ef4444" stroke-width="1" opacity="0">
    <animate attributeName="r" values="7;22" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
    <animate attributeName="opacity" values="0.5;0" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
  </circle>

  <!-- Travelling packet -->
  <circle r="4" fill="#63c8ff" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" path="M120,80 L680,80"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.9;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Packet trail -->
  <circle r="2.5" fill="#63c8ff" opacity="0.5">
    <animateMotion dur="3s" repeatCount="indefinite" begin="-0.08s" path="M120,80 L680,80"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.05;0.9;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.5" fill="#63c8ff" opacity="0.3">
    <animateMotion dur="3s" repeatCount="indefinite" begin="-0.15s" path="M120,80 L680,80"/>
    <animate attributeName="opacity" values="0;0.3;0.3;0" keyTimes="0;0.05;0.9;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Node labels below -->
  <text x="120" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.7">LOCAL</text>
  <text x="280" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6" opacity="0.7">ISP</text>
  <text x="400" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" opacity="0.7">IX</text>
  <text x="520" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#f97316" opacity="0.7">CDN</text>
  <text x="680" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444" opacity="0.7">DEST</text>

  <!-- Eyebrow -->
  <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="10" fill="#63c8ff" opacity="0.5" letter-spacing="5">NETWORK ROUTE VISUALIZATION</text>

  <!-- Main title -->
  <text x="400" y="136" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="4">MTR VISUALIZER</text>
</svg>