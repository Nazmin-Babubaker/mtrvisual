<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="160" fill="#0b1220" rx="10"/>

  <!-- Route line -->
  <line x1="120" y1="80" x2="680" y2="80" stroke="#334155" stroke-width="1.5" />

  <!-- Nodes -->
  <circle cx="120" cy="80" r="5" fill="#22c55e"/>
  <circle cx="280" cy="80" r="5" fill="#3b82f6"/>
  <circle cx="400" cy="80" r="5" fill="#8b5cf6"/>
  <circle cx="520" cy="80" r="5" fill="#f59e0b"/>
  <circle cx="680" cy="80" r="5" fill="#ef4444"/>

  <!-- Labels -->
  <text x="120" y="105" text-anchor="middle" font-family="Inter, monospace" font-size="10" fill="#94a3b8">LOCAL</text>
  <text x="280" y="105" text-anchor="middle" font-family="Inter, monospace" font-size="10" fill="#94a3b8">ISP</text>
  <text x="400" y="105" text-anchor="middle" font-family="Inter, monospace" font-size="10" fill="#94a3b8">IX</text>
  <text x="520" y="105" text-anchor="middle" font-family="Inter, monospace" font-size="10" fill="#94a3b8">CDN</text>
  <text x="680" y="105" text-anchor="middle" font-family="Inter, monospace" font-size="10" fill="#94a3b8">DEST</text>

  <!-- Eyebrow -->
  <text x="400" y="28" text-anchor="middle" font-family="Inter, monospace" font-size="10" fill="#64748b" letter-spacing="3">
    NETWORK ROUTE VISUALIZATION
  </text>

  <!-- Title -->
  <text x="400" y="135" text-anchor="middle" font-family="Inter, monospace" font-size="26" font-weight="600" fill="#e2e8f0" letter-spacing="2">
    MTR VISUAL
  </text>

</svg>
