<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>mtrVisual</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>


<!-- Three.js core and add-ons for globe rendering -->
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

</head>
<body>

<header>
  <div class="logo">mtrVisual</div>
 
  <div class="probe-row">
    <div class="input-wrap">
      <div class="input-prefix">TRACE →</div>
      <input id="url-input" type="text" placeholder="github.com  or  https://cloudflare.com" spellcheck="false"/>
    </div>
    <button class="btn-trace" id="trace-btn" onclick="startTrace()">mtr</button>
  </div>
   <div class="view-toggle">
    <button class="toggle-btn active" id="btn-map" onclick="switchView('map')">2D Map</button>
    <button class="toggle-btn" id="btn-globe" onclick="switchView('globe')">3D Globe</button>
  </div>
</header>

<div class="main" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
  <div style="display:flex; flex:1; min-height:0;">
    <!-- Sidebar (left) -->
    <div class="sidebar">
      <div class="sidebar-header">Route hops</div>
      <div class="hop-list" id="hop-list">
        <div class="state-box">
          <div class="state-title">No trace yet</div>
          <div class="state-sub">Enter any domain to see the physical path your packets take across the internet.</div>
        </div>
      </div>
      <div class="stats-bar" id="stats-bar" style="display:none">
        <div class="stat"><div class="stat-val" id="stat-hops">—</div><div class="stat-label">total hops</div></div>
        <div class="stat"><div class="stat-val" id="stat-geo">—</div><div class="stat-label">geolocated</div></div>
        <div class="stat"><div class="stat-val" id="stat-rtt">—</div><div class="stat-label">final RTT</div></div>
      </div>
    </div>

    <!-- Split view: left 2D map, right 3D globe -->
    <div class="view-container">
      <div id="panel-map" class="panel">
        <div id="map" style="height:100%; width:100%;"></div>
        <div class="map-legend">
          <div class="legend-item"><div class="legend-dot" style="border-color:#94a3b8"></div>Local / private</div>
          <div class="legend-item"><div class="legend-dot" style="border-color:#00aaff"></div>ISP / transit</div>
          <div class="legend-item"><div class="legend-dot" style="border-color:#f59e0b"></div>CDN edge</div>
          <div class="legend-item"><div class="legend-dot" style="border-color:#00e5a0"></div>Destination</div>
        </div>
      </div>
      <div id="panel-globe" class="panel hidden">
        <div id="globe-container"></div>
        <div class="globe-label">🌍 3D EARTH · ANIMATED ROUTE</div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

  // --- GLOBE SETUP (exposed globally for trace animation) ---
  const container = document.getElementById('globe-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x03050a);
  
  const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(0, 0, 3.2);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);
  
  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(container.clientWidth, container.clientHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0px';
  labelRenderer.domElement.style.left = '0px';
  labelRenderer.domElement.style.pointerEvents = 'none';
  container.appendChild(labelRenderer.domElement);
  
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = false;
  controls.enableZoom = true;
  controls.zoomSpeed = 0.8;
  controls.rotateSpeed = 0.8;
  controls.target.set(0, 0, 0);
  
  // Add stars background
  const starGeometry = new THREE.BufferGeometry();
  const starCount = 2000;
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    starPositions[i*3] = (Math.random() - 0.5) * 2000;
    starPositions[i*3+1] = (Math.random() - 0.5) * 1000;
    starPositions[i*3+2] = (Math.random() - 0.5) * 500 - 200;
  }
  starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, transparent: true, opacity: 0.7 });
  const stars = new THREE.Points(starGeometry, starMaterial);
  scene.add(stars);
  
  // Earth sphere with high-res texture
  const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
  const textureLoader = new THREE.TextureLoader();
  const earthTexture = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
const earthMaterial = new THREE.MeshBasicMaterial({ map: earthTexture });
  const earth = new THREE.Mesh(earthGeometry, earthMaterial);
  scene.add(earth);
  
  // Add atmosphere glow
  const glowGeometry = new THREE.SphereGeometry(1.01, 64, 64);
  const glowMaterial = new THREE.MeshPhongMaterial({ color: 0x2266aa, transparent: true, opacity: 0.12 });
  const atmosphere = new THREE.Mesh(glowGeometry, glowMaterial);
  scene.add(atmosphere);
  
  // // Lighting
  // const ambientLight = new THREE.AmbientLight(0x555555);
  // scene.add(ambientLight);
  // const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  // dirLight.position.set(5, 3, 5);
  // scene.add(dirLight);
  // const backLight = new THREE.PointLight(0x4466cc, 0.3);
  // backLight.position.set(-2, -1, -3);
  // scene.add(backLight);
  
  // Helper: lat/lng to Vector3 (radius 1)
  function latLngToVector3(lat, lng, radius = 1.01) {
    const phi =  (90-lat) * Math.PI / 180;
    const theta = (lng+180) * Math.PI / 180;
    const x = -radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
  }
  
  // Storage for globe objects
  let globeMarkers = [];     // { mesh, label, hopIndex }
  let globeArcs = [];        // current line segments for arcs
  let activeArcAnimation = null;
  
  function clearGlobe() {
    globeMarkers.forEach(item => {
      if (item.mesh) scene.remove(item.mesh);
      if (item.label) scene.remove(item.label);
    });
    globeArcs.forEach(arc => scene.remove(arc));
    globeMarkers = [];
    globeArcs = [];
    if (activeArcAnimation) clearTimeout(activeArcAnimation);
  }
  
  // Create a small glowing sphere marker
  function addGlobeMarker(lat, lng, colorHex, hopIndex, tooltipText = "") {
    const pos = latLngToVector3(lat, lng, 1.008);
    const geometry = new THREE.SphereGeometry(0.012, 16, 16);
    const material = new THREE.MeshStandardMaterial({ color: colorHex, emissive: colorHex, emissiveIntensity: 0.5 });
    const marker = new THREE.Mesh(geometry, material);
    marker.userData = { hopIndex };
    marker.position.copy(pos);
    scene.add(marker);
    
    // CSS2D label
    const div = document.createElement('div');
    div.textContent = tooltipText || `Hop ${hopIndex+1}`;
    div.style.color = '#d4dde8';
    div.style.fontSize = '10px';
    div.style.fontFamily = "'JetBrains Mono', monospace";
    div.style.backgroundColor = 'rgba(17,23,32,0.8)';
    div.style.padding = '2px 6px';
    div.style.borderRadius = '12px';
    div.style.border = `1px solid ${new THREE.Color(colorHex).getStyle()}`;
    div.style.whiteSpace = 'nowrap';
    div.style.backdropFilter = 'blur(4px)';
    div.style.pointerEvents = 'none';
    const label = new CSS2DObject(div);
    label.position.copy(pos.clone().multiplyScalar(1.02));
    scene.add(label);
    
    globeMarkers.push({ mesh: marker, label, hopIndex, lat, lng });
    return marker;
  }
  
  // Animated arc from point A to B with dashed style, incremental drawing (fly effect)
  async function animateGlobeArc(fromLat, fromLng, toLat, toLng, colorHex, duration = 500) {
    const startVec = latLngToVector3(fromLat, fromLng, 1.01);
    const endVec = latLngToVector3(toLat, toLng, 1.01);
    // Compute great-circle interpolation points (slerp)
    const points = [];
    const steps = 60;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      // spherical linear interpolation
      const theta = Math.acos(Math.min(1, Math.max(-1, startVec.dot(endVec))));
      const sinTheta = Math.sin(theta);
      const a = Math.sin((1 - t) * theta) / sinTheta;
      const b = Math.sin(t * theta) / sinTheta;
      const interpVec = new THREE.Vector3().copy(startVec).multiplyScalar(a).add(endVec.clone().multiplyScalar(b)).normalize().multiplyScalar(1.01);
      points.push(interpVec);
    }
    
    // Create a dynamic line that grows segment by segment
    const material = new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.85 });
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(3); // start empty
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const lineObj = new THREE.Line(geometry, material);
    scene.add(lineObj);
    globeArcs.push(lineObj);
    
    let currentStep = 1;
    return new Promise((resolve) => {
      const interval = setInterval(() => {
        if (currentStep > points.length) {
          clearInterval(interval);
          resolve();
          return;
        }
        const slice = points.slice(0, currentStep);
        const newPositions = new Float32Array(slice.length * 3);
        slice.forEach((p, idx) => {
          newPositions[idx*3] = p.x;
          newPositions[idx*3+1] = p.y;
          newPositions[idx*3+2] = p.z;
        });
        geometry.setAttribute('position', new THREE.BufferAttribute(newPositions, 3));
        currentStep++;
      }, duration / steps);
    });
  }
  
  // Main globe animation for hops (sequential)
  async function animateGlobeRoute(geoHops, hopsFull, classifications) {
    if (!geoHops.length) return;
    clearGlobe();
    // Add all markers first but invisible? we add gradually with pulse
    // We'll add them one by one during animation
    for (let i = 0; i < geoHops.length; i++) {
      const hop = geoHops[i];
      const origHopIndex = hop.originalIndex;
      const type = classifications[origHopIndex];
      let colorHex = HOP_COLORS_GLOBE[type] || '#00aaff';
      if (origHopIndex === hopsFull.length-1) colorHex = '#00e5a0';
      const marker = addGlobeMarker(hop.geo.lat, hop.geo.lng, colorHex, origHopIndex, `${hop.host || hop.ip}\n${hop.geo.city || ''} ${hop.geo.country || ''}`);
      marker.userData.pulse = true;
      // pulse effect: scale up/down temporarily
      setTimeout(() => {
        if (marker && marker.material) marker.material.emissiveIntensity = 0.9;
        setTimeout(() => { if(marker && marker.material) marker.material.emissiveIntensity = 0.3; }, 400);
      }, 100);
    }
    
    // Animate arcs sequentially
    for (let i = 1; i < geoHops.length; i++) {
      const prev = geoHops[i-1];
      const curr = geoHops[i];
      const prevType = classifications[prev.originalIndex];
      const currType = classifications[curr.originalIndex];
      let arcColor = HOP_COLORS_GLOBE[currType] || '#f59e0b';
      if (curr.originalIndex === hopsFull.length-1) arcColor = '#00e5a0';
      await animateGlobeArc(prev.geo.lat, prev.geo.lng, curr.geo.lat, curr.geo.lng, arcColor, 480);
      await sleep(180);
    }
  }
  
  const HOP_COLORS_GLOBE = { local:'#94a3b8', isp:'#00aaff', cdn:'#f59e0b', origin:'#00e5a0' };
  
  // Expose globe functions globally for trace animation
  window.__globe = { animateGlobeRoute, clearGlobe };
  
  // Animation loop
  function animateGlobe() {
    requestAnimationFrame(animateGlobe);
    controls.update(); // update orbit
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  }
  animateGlobe();
  
  // handle resize
  window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    labelRenderer.setSize(w, h);
  });
  
  // small delay to set initial size
  setTimeout(() => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    labelRenderer.setSize(w, h);
  }, 100);
</script>

<script>
  const API = 'http://localhost:5000';
  const map = L.map('map', { center:[20,0], zoom:2, zoomControl:true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap © CartoDB', subdomains:'abcd', maxZoom:19
  }).addTo(map);
  
  const CDN_KEYWORDS = ['cloudflare','akamai','fastly','cloudfront','amazon','google','microsoft','azure','vercel','netlify'];
  function classifyHop(hop, isLast) {
    if (isLast) return 'origin';
    if (!hop.ip || !hop.geo) return 'local';
    const org = (hop.geo.org || '').toLowerCase();
    if (CDN_KEYWORDS.some(k => org.includes(k))) return 'cdn';
    return 'isp';
  }
  const HOP_COLORS = { local:'#94a3b8', isp:'#00aaff', cdn:'#f59e0b', origin:'#00e5a0' };
  
  let mapLayers = [];
  let hopItems = [];
  
  function clearMap() {
    mapLayers.forEach(l => map.removeLayer(l));
    mapLayers = [];
  }
  
  async function startTrace() {
    const input = document.getElementById('url-input').value.trim();
    if (!input) return;
    const btn = document.getElementById('trace-btn');
    btn.disabled = true;
    btn.textContent = 'Running…';
    clearMap();
    if (window.__globe) window.__globe.clearGlobe();
    showLoading();
    try {
      const res = await fetch(`${API}/trace`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ url: input })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Trace failed');
      renderSidebar(data.hops);
      await animateTrace(data.hops);
      showStats(data);
    } catch(e) {
      showError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Trace route';
    }
  }
  
  function renderSidebar(hops) {
    const list = document.getElementById('hop-list');
    list.innerHTML = '';
    hopItems = [];
    hops.forEach((hop, i) => {
      const isLast = i === hops.length - 1;
      const type = classifyHop(hop, isLast);
      const color = HOP_COLORS[type];
      const hasgeo = hop.geo?.lat != null;
      const item = document.createElement('div');
      item.className = 'hop-item';
      if (hasgeo) item.onclick = () => map.flyTo([hop.geo.lat, hop.geo.lng], 6, {duration:1});
      const rttColor = !hop.avgRtt ? 'var(--muted)' : hop.avgRtt < 50 ? '#00e5a0' : hop.avgRtt < 150 ? '#f59e0b' : '#f87171';
      item.innerHTML = `
        <div class="hop-dot" style="border-color:${color};color:${color}"></div>
        <div class="hop-content">
          <div class="hop-num">hop ${hop.hop}</div>
          <div class="hop-host">${!hop.ip ? '??? (silent router)' : hop.ip}</div>
          ${hasgeo ? `<div class="hop-place">${[hop.geo.city, hop.geo.country].filter(Boolean).join(', ')}</div>` : ''}
          ${hop.geo?.org ? `<div class="hop-org">${hop.geo.org}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end">
          <div class="hop-rtt" style="color:${rttColor}">${hop.avgRtt ? hop.avgRtt.toFixed(1)+'ms' : '—'}</div>
          ${hop.loss > 0 ? `<div class="hop-loss ${hop.loss>20?'bad':''}">${hop.loss}% loss</div>` : ''}
        </div>`;
      list.appendChild(item);
      hopItems.push(item);
    });
  }
  
  async function animateTrace(hops) {
    const geoHops = hops.map((h, idx) => ({ ...h, originalIndex: idx })).filter(h => h.geo?.lat != null);
    if (!geoHops.length) return;
    const bounds = L.latLngBounds(geoHops.map(h => [h.geo.lat, h.geo.lng]));
    map.fitBounds(bounds, { padding:[60,60], animate:true, duration:1 });
    await sleep(900);
    
    // prepare classification array for globe
    const classifications = hops.map((h, idx) => classifyHop(h, idx === hops.length-1));
    
    // start globe animation in parallel with map animation but we sequence them slightly overlapping
    const globePromise = window.__globe ? window.__globe.animateGlobeRoute(geoHops, hops, classifications) : Promise.resolve();
    
    // map animation (markers + arcs)
    for (let i = 0; i < hops.length; i++) {
      const hop = hops[i];
      const isLast = i === hops.length - 1;
      const type = classifyHop(hop, isLast);
      const color = HOP_COLORS[type];
      hopItems[i]?.classList.add('active');
      const dot = hopItems[i]?.querySelector('.hop-dot');
      if (dot) dot.classList.add('pulsing');
      if (hop.geo?.lat != null) {
        const marker = L.circleMarker([hop.geo.lat, hop.geo.lng], {
          radius: isLast ? 9 : i === 0 ? 7 : 5,
          color, weight: 2, fillColor: '#0b0f14', fillOpacity: 1,
        }).addTo(map);
        marker.bindPopup(buildPopup(hop, type, i, hops.length));
        mapLayers.push(marker);
        const prev = findPrevGeo(hops, i);
        if (prev) {
          await drawArc([prev.geo.lat, prev.geo.lng], [hop.geo.lat, hop.geo.lng], color);
        }
      }
      if (i > 0) hopItems[i-1]?.querySelector('.hop-dot')?.classList.remove('pulsing');
      await sleep(isLast ? 0 : 280);
    }
    await globePromise;
  }
  
  function findPrevGeo(hops, i) {
    for (let j = i-1; j >= 0; j--) if (hops[j].geo?.lat != null) return hops[j];
    return null;
  }
  
  function drawArc(from, to, color) {
    return new Promise(resolve => {
      const steps = 45;
      let pts = [];
      for (let i = 0; i <= steps; i++) {
        const f = i / steps;
        const lat = from[0] + (to[0] - from[0]) * f;
        const lng = from[1] + (to[1] - from[1]) * f;
        pts.push([lat, lng]);
      }
      let drawn = [pts[0]];
      const line = L.polyline(drawn, { color, weight: 1.8, opacity: 0.75, dashArray: '6 4' }).addTo(map);
      mapLayers.push(line);
      let idx = 1;
      const iv = setInterval(() => {
        if (idx >= pts.length) { clearInterval(iv); resolve(); return; }
        drawn.push(pts[idx++]);
        line.setLatLngs(drawn);
      }, 20);
    });
  }
  
  function buildPopup(hop, type, idx, total) {
    const g = hop.geo;
    return `<div style="min-width:165px"><div style="font-size:11px;color:#4a5a6a;margin-bottom:5px">hop ${hop.hop} · ${type}</div>
      <div style="font-size:13px;font-weight:500;margin-bottom:4px;color:${HOP_COLORS[type]}">${hop.ip||'???'}</div>
      ${g?.city ? `<div style="font-size:11px;margin-bottom:2px">${[g.city,g.region,g.country].filter(Boolean).join(', ')}</div>` : ''}
      ${g?.org ? `<div style="font-size:11px;color:#4a5a6a;margin-bottom:6px">${g.org}</div>` : ''}
      ${hop.avgRtt ? `<div style="font-size:12px">RTT: <span style="color:#00e5a0">${hop.avgRtt.toFixed(1)} ms</span></div>` : ''}
      ${hop.loss>0 ? `<div style="font-size:11px;color:#f87171">${hop.loss}% packet loss</div>` : ''}</div>`;
  }
  
  function showLoading() {
    document.getElementById('stats-bar').style.display = 'none';
    document.getElementById('hop-list').innerHTML = `<div class="state-box"><div class="spinner"></div><div class="state-title">Tracing route…</div><div class="state-sub">mtr sends 5 probes per hop — usually takes 10–20 seconds</div></div>`;
  }
  function showError(msg) {
    document.getElementById('hop-list').innerHTML = `<div class="state-box"><div class="state-title" style="color:#f87171">Trace failed</div><div class="state-sub" style="color:#f87171">${msg}</div></div>`;
  }
  function showStats(data) {
    const lastRtt = [...data.hops].reverse().find(h => h.avgRtt > 0)?.avgRtt;
    document.getElementById('stat-hops').textContent = data.hops.length;
    document.getElementById('stat-geo').textContent = data.geoCount;
    document.getElementById('stat-rtt').textContent = lastRtt ? lastRtt.toFixed(0)+'ms' : '—';
    document.getElementById('stats-bar').style.display = 'flex';
  }
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  document.getElementById('url-input').addEventListener('keydown', e => { if(e.key==='Enter') startTrace(); });

  function switchView(type) {
  const mapPanel = document.getElementById('panel-map');
  const globePanel = document.getElementById('panel-globe');
  const btnMap = document.getElementById('btn-map');
  const btnGlobe = document.getElementById('btn-globe');

  if (type === 'map') {
    mapPanel.classList.remove('hidden');
    globePanel.classList.add('hidden');
    btnMap.classList.add('active');
    btnGlobe.classList.remove('active');
  } else {
    mapPanel.classList.add('hidden');
    globePanel.classList.remove('hidden');
    btnMap.classList.remove('active');
    btnGlobe.classList.add('active');
    
    // Trigger a resize for Three.js so the globe doesn't look stretched
    window.dispatchEvent(new Event('resize'));
  }
}
</script>
</body>
</html>
